<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Briefing">
<meta name="theme-color" content="#1d2021">
<title>Heartwood Briefing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#1d2021;--surface:#282828;--surface2:#2c3338;--border:#32373c;--border2:#434c5e;
    --text:#d5c4a1;--dim:#a7aaad;--faint:#50626f;
    --amber:#cf995f;--amber-dim:#b0814d;--amber-bg:#2d2a24;
    --green:#a3be8c;--green-bg:#242d28;
    --yellow:#cf995f;--yellow-bg:#2d2a24;
    --red:#bf616a;--red-bg:#2d2426;
    --urgent:#d08080;--urgent-bg:#2d2426;--urgent-border:#4a2a2a;
    --review:#cf995f;--review-bg:#2d2a24;--review-border:#4a3a20;
    --noise:#50626f;--noise-bg:#282d32;
    --mono:'JetBrains Mono',monospace;--sans:'Source Sans 3',sans-serif;
  }
  body{font-family:var(--sans);font-size:18px;background:var(--bg);color:var(--text);
    line-height:1.5;min-height:100dvh;-webkit-font-smoothing:antialiased;
    overscroll-behavior-y:contain}
  .shell{max-width:1440px;margin:0 auto;padding:24px 32px 80px;
    opacity:0;animation:fadeIn .3s ease forwards}
  @keyframes fadeIn{to{opacity:1}}

  /* Dashboard grid */
  .dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:20px;align-items:start}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;min-width:0}

  /* Pull to refresh */
  .ptr{text-align:center;font-family:var(--mono);font-size:12px;color:var(--amber-dim);
    height:0;overflow:hidden;transition:height .2s}
  .ptr.visible{height:32px;line-height:32px}

  /* Header */
  .hdr{padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;text-align:center}
  .hdr-label{font-family:var(--mono);font-size:13px;text-transform:uppercase;letter-spacing:3px;color:var(--amber-dim)}
  .hdr-day{font-size:32px;font-weight:700;color:var(--amber);margin:6px 0 0}
  .hdr-date{font-size:20px;font-weight:600;color:var(--text);margin:0 0 4px}
  .hdr-updated{font-family:var(--mono);font-size:13px;color:var(--dim)}
  .hdr-updated .fresh{color:var(--green)}
  .hdr-updated .stale{color:var(--red)}

  /* Alerts */
  .alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
  .alert{font-family:var(--mono);font-size:13px;padding:10px 12px;border-left:3px solid;border-radius:2px}
  .alert-critical{background:var(--red-bg);border-color:var(--red);color:#d08080}
  .alert-warning{background:var(--yellow-bg);border-color:var(--yellow);color:#fcbb74}

  /* Section */
  .section{margin-bottom:0}
  .sec-hdr{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--dim);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px;
    display:flex;justify-content:space-between;align-items:baseline}
  .sec-count{color:var(--amber-dim);font-size:12px}

  /* Calendar */
  .ev{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
  .ev:last-child{border-bottom:none}
  .ev-time{font-family:var(--mono);font-size:14px;color:var(--amber);min-width:56px;flex-shrink:0;padding-top:1px}
  .ev-info{flex:1}
  .ev-title{font-size:15px;font-weight:600}
  .ev-loc{font-size:13px;color:var(--dim);margin-top:2px}
  .ev-allday{font-family:var(--mono);font-size:11px;color:var(--amber-dim);background:var(--amber-bg);padding:1px 6px;border-radius:2px}

  /* Jobs */
  .job{padding:10px 0;border-bottom:1px solid var(--border)}
  .job:last-child{border-bottom:none}
  .job-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .job-name{font-size:15px;font-weight:600;flex:1}
  .job-num{font-family:var(--mono);font-size:12px;color:var(--amber-dim)}
  .job-meta{font-size:13px;color:var(--dim);margin-top:3px;display:flex;gap:8px;align-items:center}
  .job-phase{font-family:var(--mono);font-size:12px;padding:1px 6px;border-radius:2px;
    background:var(--surface2);border:1px solid var(--border)}
  .test-note{font-family:var(--mono);font-size:12px;color:var(--faint);padding:8px 0}

  /* Leads */
  .lead{padding:8px 0;border-bottom:1px solid var(--border)}
  .lead:last-child{border-bottom:none}
  .lead-name{font-size:15px;font-weight:600}
  .lead-meta{font-size:13px;color:var(--dim);margin-top:2px}
  .lead-age{font-family:var(--mono);font-size:12px}
  .lead-age.old{color:var(--yellow)}
  .lead-age.urgent{color:var(--red)}

  /* Overdue */
  .overdue-item{padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline}
  .overdue-item:last-child{border-bottom:none}
  .overdue-name{font-size:15px;font-weight:600}
  .overdue-amt{font-family:var(--mono);font-size:13px;color:var(--red)}
  .overdue-total{font-family:var(--mono);font-size:14px;color:var(--red);margin-bottom:8px}

  /* System */
  .sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .sys-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
  .sys-val{font-family:var(--mono);font-size:24px;font-weight:600}
  .sys-val.ok{color:var(--green)}.sys-val.bad{color:var(--red)}
  .sys-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
  .storage-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .storage-mount{font-family:var(--mono);font-size:13px;color:var(--dim);min-width:80px}
  .storage-bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .storage-fill{height:100%;border-radius:3px;transition:width .5s}
  .storage-fill.green{background:var(--green)}.storage-fill.yellow{background:var(--yellow)}.storage-fill.red{background:var(--red)}
  .storage-pct{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:36px;text-align:right}
  .storage-avail{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:48px;text-align:right}

  /* Mail health */
  .mail-row{display:flex;align-items:center;gap:10px}
  .badge{font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:2px;text-transform:uppercase;letter-spacing:1px}
  .badge-ok{background:var(--green-bg);color:var(--green);border:1px solid #3a4a3a}
  .badge-err{background:var(--red-bg);color:var(--red);border:1px solid #4a3030}
  .badge-warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid #4a3a20}
  .mail-detail{font-size:13px;color:var(--dim)}

  /* Mail tabs */
  .mail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px}
  .mail-tab{font-family:var(--mono);font-size:12px;padding:8px 16px;cursor:pointer;color:var(--dim);
    background:none;border:none;border-bottom:2px solid transparent;text-transform:uppercase;
    letter-spacing:.5px;transition:color .15s,border-color .15s}
  .mail-tab:hover{color:var(--text)}
  .mail-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
  .mail-tab:focus-visible{outline:1px solid var(--amber);outline-offset:-1px}
  .mail-live{font-family:var(--mono);font-size:11px;color:var(--green);text-align:right;margin-top:8px}

  /* Mail triage */
  .thread{border:1px solid var(--border);border-radius:4px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
  .thread:hover{border-color:var(--border2)}
  .thread.urgent{border-left:3px solid var(--urgent)}
  .thread.review{border-left:3px solid var(--review)}
  .thread.noise{border-left:3px solid var(--noise)}
  .thread.done{opacity:.35}

  .thread-main{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;cursor:pointer;user-select:none}
  .thread-body{flex:1;min-width:0}
  .thread-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;flex-wrap:wrap}
  .thread-from{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
  .thread-subject{font-size:13px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .thread-date{font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap;margin-left:auto}
  .thread-summary{font-size:13px;color:var(--dim);line-height:1.5}
  .thread-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
  .tag{font-family:var(--mono);font-size:11px;padding:1px 5px;border-radius:2px;background:var(--surface2);color:var(--faint)}
  .tag.attachment{background:#2a3040;color:#5e81ac}
  .thread-chevron{font-family:var(--mono);font-size:10px;color:var(--faint);flex-shrink:0;margin-top:2px;transition:transform .15s}
  .thread.open .thread-chevron{transform:rotate(180deg)}

  .thread-actions{display:flex;gap:6px;padding:8px 12px 10px;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
  .act{font-family:var(--mono);font-size:12px;padding:5px 12px;border-radius:3px;cursor:pointer;
    border:1px solid var(--border2);background:transparent;color:var(--dim);transition:all .12s;letter-spacing:.03em}
  .act:hover{border-color:var(--amber-dim);color:var(--amber)}
  .act.primary{border-color:var(--amber-dim);color:var(--amber);background:var(--amber-bg)}
  .act.primary:hover{background:#3a3020}
  .act.danger:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
  .act.done-state{border-color:var(--green);color:var(--green);background:var(--green-bg);cursor:default}
  .act.err-state{border-color:var(--red);color:var(--red);cursor:default}
  .act:disabled{opacity:.4;cursor:default}

  /* Weather */
  .wx-row{display:flex;align-items:flex-start;gap:16px;padding:8px 0}
  .wx-temp{font-family:var(--mono);font-size:32px;font-weight:600;color:var(--amber);line-height:1}
  .wx-range{font-family:var(--mono);font-size:13px;color:var(--dim);margin-top:4px}
  .wx-detail{flex:1}
  .wx-cond{font-size:15px;font-weight:600;margin-bottom:4px}
  .wx-meta{font-family:var(--mono);font-size:13px;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap}
  .wx-warn{font-family:var(--mono);font-size:12px;padding:6px 10px;border-radius:2px;margin-top:8px;
    background:var(--yellow-bg);border:1px solid var(--yellow);color:#fcbb74}
  .wx-note{font-size:13px;color:var(--dim);margin-top:6px}

  /* Weekly snapshot */
  .snap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .snap-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
  .snap-val{font-family:var(--mono);font-size:24px;font-weight:600;color:var(--amber)}
  .snap-val.zero{color:var(--dim)}
  .snap-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

  /* Comms */
  .comms-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .comms-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
  .comms-val{font-family:var(--mono);font-size:24px;font-weight:600}
  .comms-val.ok{color:var(--green)}.comms-val.warn{color:var(--yellow)}
  .comms-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
  .comms-item{padding:8px 0;border-bottom:1px solid var(--border)}
  .comms-item:last-child{border-bottom:none}
  .comms-item-name{font-size:15px;font-weight:600}
  .comms-item-meta{font-size:13px;color:var(--dim);margin-top:2px}

  /* Backup */
  .bak-row{display:flex;align-items:center;gap:12px;padding:8px 0;flex-wrap:wrap}
  .bak-stat{display:flex;align-items:center;gap:8px}
  .bak-detail{font-family:var(--mono);font-size:13px;color:var(--dim)}

  /* Tasks */
  .task-group{margin-bottom:12px}
  .task-group-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;user-select:none}
  .task-group-hdr.static{cursor:default}
  .task-group-label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;color:var(--dim)}
  .task-group-label.overdue{color:var(--red)}
  .task-group-label.today{color:var(--amber)}
  .task-group-count{font-family:var(--mono);font-size:11px;padding:1px 7px;border-radius:10px;background:var(--surface2);color:var(--dim);border:1px solid var(--border)}
  .task-group-chevron{font-family:var(--mono);font-size:10px;color:var(--faint);transition:transform .15s}
  .task-group.collapsed .task-group-chevron{transform:rotate(-90deg)}
  .task-group-items{overflow:hidden}
  .task-group.collapsed .task-group-items{display:none}
  .task-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
  .task-item:last-child{border-bottom:none}
  .task-check{font-family:var(--mono);font-size:14px;flex-shrink:0;margin-top:1px;color:var(--faint)}
  .task-check.done{color:var(--green)}
  .task-info{flex:1;min-width:0}
  .task-name{font-size:14px;font-weight:600}
  .task-name.done{text-decoration:line-through;color:var(--dim)}
  .task-job{font-size:12px;color:var(--dim)}
  .task-due{font-family:var(--mono);font-size:12px;color:var(--dim);flex-shrink:0}
  .task-due.overdue{color:var(--red)}

  /* Recent documents */
  .doc-item{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
  .doc-item:last-child{border-bottom:none}
  .doc-type{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
  .doc-type.estimate{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-dim)}
  .doc-type.invoice{background:var(--green-bg);color:var(--green);border:1px solid #3a4a3a}
  .doc-type.change-order{background:#2a3040;color:#5e81ac;border:1px solid #3a4a5a}
  .doc-type.other{background:var(--surface2);color:var(--dim);border:1px solid var(--border)}
  .doc-info{flex:1;min-width:0}
  .doc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .doc-meta{font-size:12px;color:var(--dim)}
  .doc-amt{font-family:var(--mono);font-size:13px;color:var(--amber);flex-shrink:0;text-align:right}

  /* Footer */
  .footer{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;
    padding:20px 0 0;border-top:1px solid var(--border);margin-top:20px;letter-spacing:.5px}

  /* Links */
  a{color:inherit}
  .lnk{color:var(--amber);text-decoration:none;border-bottom:1px solid transparent}
  .lnk:hover{border-bottom-color:var(--amber)}
  .sec-link{font-family:var(--mono);font-size:12px;color:var(--amber-dim);text-decoration:none;letter-spacing:.5px}
  .sec-link:hover{color:var(--amber)}
  .cal-day{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--amber-dim);padding:10px 0 4px;border-bottom:1px solid var(--border)}
  .cal-day.today{color:var(--amber)}
  .failed-unit{font-family:var(--mono);font-size:13px;color:var(--red);padding:2px 0}
  .status-tag{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:2px;
    background:var(--surface2);border:1px solid var(--border);color:var(--dim)}

  /* Misc */
  .empty{font-family:var(--mono);font-size:13px;color:var(--dim);padding:10px 0}
  .empty-hint{font-family:var(--mono);font-size:12px;color:var(--faint);padding:4px 0 0}
  .err-box{background:var(--red-bg);border:1px solid #4a3030;border-radius:4px;padding:20px;text-align:center;margin:40px 0}
  .err-box h2{font-family:var(--mono);font-size:15px;color:var(--red);margin-bottom:8px}
  .err-box p{font-size:14px;color:var(--dim)}
</style>
</head>
<body>
<div class="shell">
  <div class="ptr" id="ptr">pull to refresh</div>
  <div id="app"></div>
</div>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const WEBHOOK_BASE='https://hwc-server.ocelot-wahoo.ts.net/webhook';
const WEBHOOK_ACTION=WEBHOOK_BASE+'/mail-action';
const WEBHOOK_QUERY=WEBHOOK_BASE+'/mail-query';

// ── DOM helper ────────────────────────────────────────────────────────────────
const $=(tag,attrs,...ch)=>{
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return el;
};

// ── Formatters ────────────────────────────────────────────────────────────────
function timeAgo(iso){
  const m=Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if(m<1)return{text:'just now',cls:'fresh'};
  if(m<60)return{text:`${m}m ago`,cls:m<30?'fresh':''};
  const h=Math.floor(m/60);
  if(h<24)return{text:`${h}h ago`,cls:h<2?'':'stale'};
  return{text:`${Math.floor(h/24)}d ago`,cls:'stale'};
}
function fmtTime(iso){
  if(!iso)return null;
  const d=new Date(iso);let h=d.getHours(),m=d.getMinutes();
  const ap=h>=12?'p':'a';h=h%12||12;
  return`${h}:${String(m).padStart(2,'0')}${ap}`;
}
function fmtDate(d){
  const mos=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return`${mos[d.getMonth()]} ${d.getDate()}`;
}
function fmtDay(d){
  return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
}
function stColor(p){return p>=90?'red':p>=75?'yellow':'green'}
function fmtShortDate(iso){
  if(!iso)return'';
  // Date-only strings must not round-trip through Date() — UTC midnight
  // renders as the previous day in Denver.
  const m=String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return`${+m[2]}/${+m[3]}`;
  const d=new Date(iso);
  return`${d.getMonth()+1}/${d.getDate()}`;
}

// ── Live mail query ───────────────────────────────────────────────────────────
async function fetchLiveThreads(){
  try{
    const r=await fetch(WEBHOOK_QUERY,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)return null;
    return await r.json();
  }catch{return null}
}

function mergeMailData(cached,live){
  if(!live||!Array.isArray(live))return cached;
  const liveSet=new Set(live.map(t=>t.thread));
  const result={urgent:[],review:[],noise:[]};
  const seen=new Set();
  for(const[bucket,threads]of Object.entries(cached.buckets||{})){
    for(const t of(threads||[])){
      if(liveSet.has(t.thread_id)){result[bucket].push(t);seen.add(t.thread_id)}
    }
  }
  for(const lt of live){
    if(!seen.has(lt.thread)){
      result.review.push({
        thread_id:lt.thread,subject:lt.subject||'(no subject)',
        from_name:lt.authors||'',from_address:'',
        date_relative:lt.date_relative||'',tags:lt.tags||[],
        has_attachment:(lt.tags||[]).includes('attachment'),
        summary:'',suggested_action:'read_only'
      });
    }
  }
  return{...cached,buckets:result,
    stats:{urgent_count:result.urgent.length,review_count:result.review.length,noise_count:result.noise.length},
    _live:true};
}

// ── Mail action webhook ───────────────────────────────────────────────────────
async function doAction(threadId,action){
  const r=await fetch(WEBHOOK_ACTION,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({threadId,action})
  });
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const data=await r.json();
  if(!data.ok)throw new Error('notmuch reported failure');
  return data;
}

// ── Thread card ───────────────────────────────────────────────────────────────
function makeThread(t,bucket){
  const wrap=$('div',{class:`thread ${bucket}`});
  let expanded=false,actDone=false;
  const chevron=$('span',{class:'thread-chevron'},'▾');
  const body=$('div',{class:'thread-body'});
  const top=$('div',{class:'thread-top'});
  top.appendChild($('span',{class:'thread-from'},t.from_name||t.from_address));
  top.appendChild($('span',{class:'thread-subject'},t.subject));
  top.appendChild($('span',{class:'thread-date'},t.date_relative||''));
  body.appendChild(top);
  body.appendChild($('div',{class:'thread-summary'},t.summary));
  if(t.tags&&t.tags.length){
    const tg=$('div',{class:'thread-tags'});
    t.tags.filter(x=>!['inbox','unread','flagged'].includes(x)).forEach(x=>{
      tg.appendChild($('span',{class:`tag ${x==='attachment'?'attachment':''}`},x));
    });
    body.appendChild(tg);
  }
  const main=$('div',{class:'thread-main'});
  main.appendChild(body);main.appendChild(chevron);wrap.appendChild(main);

  const actions=$('div',{class:'thread-actions',style:'display:none'});
  function setDone(label,tags){
    actions.innerHTML='';
    const tagStr=tags&&tags.length?tags.filter(t=>!['inbox','unread'].includes(t)).join(', '):'';
    actions.appendChild($('span',{class:'act done-state'},`\u2713 ${label}${tagStr?' \u00b7 '+tagStr:''}`));
    wrap.classList.add('done');actDone=true;
  }
  function setErr(){
    actions.querySelectorAll('.act').forEach(b=>{b.disabled=false});
    const e=$('span',{class:'act err-state'},'\u2717 failed');
    actions.insertBefore(e,actions.firstChild);
    setTimeout(()=>e.remove(),3000);
  }
  function makeBtn(label,action,cls=''){
    return $('button',{class:`act ${cls}`,onclick:async()=>{
      if(actDone)return;
      actions.querySelectorAll('.act').forEach(x=>x.disabled=true);
      try{const data=await doAction(t.thread_id,action);setDone(label,data.tags)}catch{setErr()}
    }},label);
  }
  const suggested=t.suggested_action||'none';
  const primaryLabels={reply:'Reply',archive:'Archive',trash:'Trash',
    flag_action:'Flag: action',flag_pending:'Flag: pending',read_only:'Mark read',none:'Mark read'};
  const primaryAction=suggested==='reply'?'read_only':suggested==='none'?'read_only':suggested;
  actions.appendChild(makeBtn(primaryLabels[suggested]||'Mark read',primaryAction,'primary'));
  if(suggested!=='archive')actions.appendChild(makeBtn('Archive','archive'));
  if(suggested!=='trash')actions.appendChild(makeBtn('Trash','trash','danger'));
  if(!['flag_action','flag_pending'].includes(suggested)){
    actions.appendChild(makeBtn('\u2691 Action','flag_action'));
    actions.appendChild(makeBtn('\u23f8 Pending','flag_pending'));
  }
  wrap.appendChild(actions);
  main.addEventListener('click',()=>{
    expanded=!expanded;wrap.classList.toggle('open',expanded);
    actions.style.display=expanded?'flex':'none';
  });
  return wrap;
}

// ── Calendar section (7-day window, grouped by day) ─────────────────────────
function localYmd(d){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayLabel(ymdStr){
  const today=localYmd(new Date());
  const tmr=new Date();tmr.setDate(tmr.getDate()+1);
  if(ymdStr===today)return'Today';
  if(ymdStr===localYmd(tmr))return'Tomorrow';
  const[y,m,d]=ymdStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return`${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()]} ${m}/${d}`;
}
function makeCalendar(cal){
  const evts=(cal.events||[]).slice().sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const sec=$('div',{class:'section'});
  sec.appendChild($('div',{class:'sec-hdr'},$('span',null,'Calendar'),$('span',{class:'sec-count'},'7 days · '+evts.length)));
  if(!evts.length){sec.appendChild($('div',{class:'empty'},'No events in the next 7 days'));return sec}
  const byDay=new Map();
  evts.forEach(ev=>{
    const day=ev.date||(ev.start||'').split('T')[0]||'?';
    if(!byDay.has(day))byDay.set(day,[]);
    byDay.get(day).push(ev);
  });
  const today=localYmd(new Date());
  [...byDay.keys()].sort().forEach(day=>{
    sec.appendChild($('div',{class:`cal-day${day===today?' today':''}`},dayLabel(day)));
    byDay.get(day).forEach(ev=>{
      const time=ev.allDay
        ?$('div',{class:'ev-time'},$('span',{class:'ev-allday'},'ALL DAY'))
        :$('div',{class:'ev-time'},fmtTime(ev.start)||'');
      const info=$('div',{class:'ev-info'},$('div',{class:'ev-title'},ev.summary));
      if(ev.location){
        const loc=/^https?:\/\//.test(ev.location)
          ?$('a',{class:'lnk',href:ev.location,target:'_blank',style:'font-size:13px'},'join link →')
          :$('span',null,ev.location);
        info.appendChild($('div',{class:'ev-loc'},loc));
      }
      sec.appendChild($('div',{class:'ev'},time,info));
    });
  });
  return sec;
}

// ── Mail tile with tabs ──────────────────────────────────────────────────────
function makeMailTile(triage,liveThreads,mailHealth){
  const sec=$('div',{class:'section'});
  let merged=triage||{buckets:{},stats:{}};
  if(liveThreads&&triage&&!triage.error){merged=mergeMailData(triage,liveThreads)}

  sec.appendChild($('div',{class:'sec-hdr'},
    $('span',null,'Mail'),
    merged.error?$('span',{class:'sec-count',style:'color:var(--red)'},'error'):$('span')
  ));

  if(merged.error){
    sec.appendChild($('div',{class:'empty'},`Triage unavailable: ${merged.error}`));
    sec.appendChild($('div',{class:'empty-hint'},'diagnose on hwc-server: domains/business/morning-briefing/logs/run.log (+ mail-triage-raw.log)'));
    appendMailHealth(sec,mailHealth);
    return sec;
  }

  const b=merged.buckets||{};
  const urgent=b.urgent||[],review=b.review||[],noise=b.noise||[];
  const reviewAll=[...urgent,...review];
  const all=[...reviewAll,...noise];

  // Tabs
  const tabs=$('div',{class:'mail-tabs',role:'tablist'});
  const tabReview=$('button',{class:'mail-tab active',role:'tab','aria-selected':'true'},`Review (${reviewAll.length})`);
  const tabNoise=$('button',{class:'mail-tab',role:'tab','aria-selected':'false'},`Noise (${noise.length})`);
  const tabAll=$('button',{class:'mail-tab',role:'tab','aria-selected':'false'},`All (${all.length})`);
  tabs.appendChild(tabReview);tabs.appendChild(tabNoise);tabs.appendChild(tabAll);
  sec.appendChild(tabs);

  // Panels
  const panelReview=$('div',{role:'tabpanel'});
  const panelNoise=$('div',{role:'tabpanel',style:'display:none'});
  const panelAll=$('div',{role:'tabpanel',style:'display:none'});

  if(!reviewAll.length)panelReview.appendChild($('div',{class:'empty'},'Inbox zero'));
  else reviewAll.forEach(t=>panelReview.appendChild(makeThread(t,urgent.includes(t)?'urgent':'review')));

  if(!noise.length)panelNoise.appendChild($('div',{class:'empty'},'No noise'));
  else noise.forEach(t=>panelNoise.appendChild(makeThread(t,'noise')));

  if(!all.length)panelAll.appendChild($('div',{class:'empty'},'Inbox zero'));
  else all.forEach(t=>{
    const bkt=urgent.includes(t)?'urgent':review.includes(t)?'review':'noise';
    panelAll.appendChild(makeThread(t,bkt));
  });

  sec.appendChild(panelReview);sec.appendChild(panelNoise);sec.appendChild(panelAll);

  // Tab switching
  const allTabs=[tabReview,tabNoise,tabAll],allPanels=[panelReview,panelNoise,panelAll];
  function switchTab(i){
    allTabs.forEach((t,j)=>{t.classList.toggle('active',j===i);t.setAttribute('aria-selected',j===i?'true':'false')});
    allPanels.forEach((p,j)=>{p.style.display=j===i?'':'none'});
  }
  allTabs.forEach((tab,i)=>tab.addEventListener('click',()=>switchTab(i)));
  tabs.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
      const cur=allTabs.findIndex(t=>t.classList.contains('active'));
      const next=(cur+(e.key==='ArrowRight'?1:-1)+allTabs.length)%allTabs.length;
      switchTab(next);allTabs[next].focus();e.preventDefault();
    }
  });

  // Default to All tab if review is empty but others exist
  if(!reviewAll.length&&all.length)switchTab(2);

  if(merged._live)sec.appendChild($('div',{class:'mail-live'},'\u25cf live'));

  appendMailHealth(sec,mailHealth);
  return sec;
}

function appendMailHealth(sec,mailHealth){
  if(!mailHealth)return;
  const row=$('div',{class:'mail-row',style:'margin-top:12px;padding-top:12px;border-top:1px solid var(--border)'});
  row.appendChild($('span',{class:`badge ${mailHealth.healthy?'badge-ok':'badge-err'}`},mailHealth.healthy?'healthy':'unhealthy'));
  if(mailHealth.summary)row.appendChild($('span',{class:'mail-detail'},mailHealth.summary));
  sec.appendChild(row);
}

// ── Ops section (overnight digest — since previous evening) ─────────────────
function makeOps(ops){

        down=ops.prometheus_targets_down||[],disk=ops.disk_forecast||[],nb=ops.nightly_builds_finished||[];
  const quiet=!svc.length&&!probes.length&&!errs.length&&!down.length&&!nb.length;
  const sec=$('div',{class:'section'});
  const sinceLabel=ops.since?`since ${(ops.since||'').slice(5,16)}`:'';
  sec.appendChild($('div',{class:'sec-hdr'},
    $('span',null,'Overnight Ops'),
    $('a',{class:'sec-link',href:'https://grafana.hwc.iheartwoodcraft.com/d/service-health',target:'_blank'},`${sinceLabel} · Service Health →`)));
  if(quiet){
    sec.appendChild($('div',{class:'empty'},'Quiet night — no failures, no probe drops, no errors'));
  }else{
    svc.forEach(f=>sec.appendChild($('div',{class:'failed-unit'},`✗ ${f.service} failed @ ${(f.time||'').slice(11,16)}`)));
    probes.forEach(p=>{

      nb.forEach(n=>sec.appendChild($('div',{class:'item'},$('span',{class:'item-title'},`· ${n}`))));

  if(total===0&&unschedArr.length===0){sec.appendChild($('div',{class:'empty'},'No tasks scheduled'));return sec}
  function makeTaskItem(t,isOverdue){
    const item=$('div',{class:'task-item'}),done=t.completed===true;
    item.appendChild($('span',{class:`task-check${done?' done':''}`},done?'[x]':'[ ]'));
    const info=$('div',{class:'task-info'});

    item.appendChild(info);
    if(t.due_date)item.appendChild($('span',{class:`task-due${isOverdue?' overdue':''}`},fmtShortDate(t.due_date)));
    return item;
  }
  function makeGroup(label,items,cssLabel,collapsed){
    if(!items.length)return null;
    const grp=$('div',{class:`task-group${collapsed?' collapsed':''}`});

    grp.appendChild(body);
    if(collapsed)hdr.addEventListener('click',()=>grp.classList.toggle('collapsed'));
    return grp;
  }
  [makeGroup('Overdue',overdueArr,'overdue',false),
   makeGroup('Due Today',todayArr,'today',false),
   makeGroup('This Week',weekArr,'',true),
   makeGroup('Unscheduled',unschedArr,'',true)

      j.status?$('span',{class:'status-tag'},j.status):null,
      meta?` ${meta}`:''));
    if(j.description)el.appendChild($('div',{style:'font-size:13px;color:var(--dim);margin-top:4px'},j.description));
    sec.appendChild(el);
  });
  if(tc>0)sec.appendChild($('div',{class:'test-note'},`+${tc} test job${tc>1?'s':''} hidden`));
  return sec;
}

// ── Leads section ────────────────────────────────────────────────────────────
function makeLeads(leads){
  const sec=$('div',{class:'section'});
  sec.appendChild($('div',{class:'sec-hdr'},
    $('span',null,'New Leads'),
    $('a',{class:'sec-link',href:'https://app.jobtread.com',target:'_blank'},`${leads.new_count||0} · JobTread →`)));
  if(!(leads.items||[]).length){sec.appendChild($('div',{class:'empty'},'No new leads'));return sec}
  leads.items.forEach(l=>{
    const ac=l.days_old>5?'urgent':l.days_old>2?'old':'';
    const meta=[l.job_name,l.job_type].filter(Boolean).join(' \u2014 ');
    sec.appendChild($('div',{class:'lead'},
      $('div',null,jobLink(l.name,l.url,'lead-name')),
      $('div',{class:'lead-meta'},meta?`${meta} \u2014 `:'',$('span',{class:`lead-age ${ac}`},`${l.days_old}d old`))
    ));
  });
  return sec;
}

// ── Overdue section ──────────────────────────────────────────────────────────
function makeOverdue(overdue){
  const sec=$('div',{class:'section'});
  sec.appendChild($('div',{class:'sec-hdr'},
    $('span',null,'Overdue Invoices'),
    $('a',{class:'sec-link',href:'https://app.jobtread.com',target:'_blank'},`${overdue.count} · JobTread →`)));
  if(!overdue.count){sec.appendChild($('div',{class:'empty'},'Nothing overdue'));return sec}
  if(overdue.total_amount)sec.appendChild($('div',{class:'overdue-total'},`$${Math.round(overdue.total_amount).toLocaleString()} outstanding`));
  (overdue.items||[]).forEach(i=>{
    const days=i.days_past_due!=null?` · ${i.days_past_due}d past due`:'';
    const label=[i.job_name||i.name,i.account].filter(Boolean).join(' — ');
    const info=$('div',null,jobLink(label,i.url,'overdue-name'));
    info.appendChild($('div',{style:'font-size:12px;color:var(--dim)'},`${i.name||'Document'}${days}`));
    const row=$('div',{class:'overdue-item'},info);
    if(i.amount)row.appendChild($('span',{class:'overdue-amt'},`$${Math.round(i.amount).toLocaleString()}`));
    sec.appendChild(row);
  });
  return sec;
}

// ── System section ───────────────────────────────────────────────────────────
function makeSystem(sys){
  const sec=$('div',{class:'section'});
  const statusColor=sys.overall==='green'?'var(--green)':sys.overall==='yellow'?'var(--yellow)':'var(--red)';
  sec.appendChild($('div',{class:'sec-hdr'},
    $('span',null,'System'),
    $('span',{style:`color:${statusColor};font-family:var(--mono);font-size:12px`},(sys.overall||'').toUpperCase())
  ));
  const g=$('div',{class:'sys-grid'});
  g.appendChild($('div',{class:'sys-card'},
    $('div',{class:`sys-val ${sys.services_failed?'bad':'ok'}`},`${sys.services_active}`),
    $('div',{class:'sys-label'},'Services')));
  g.appendChild($('div',{class:'sys-card'},
    $('div',{class:`sys-val ${sys.containers_stopped?'bad':'ok'}`},sys.containers_running!=null?`${sys.containers_running}`:'—'),
    $('div',{class:'sys-label'},'Containers')));
  sec.appendChild(g);
  // Failed unit NAMES — a red count you can't act on is what this replaces
  if(sys.failed_units&&sys.failed_units.length){
    sys.failed_units.forEach(u=>sec.appendChild($('div',{class:'failed-unit'},'✗ '+u)));
  }
  if(sys.storage&&sys.storage.length)sys.storage.forEach(st=>{
    sec.appendChild($('div',{class:'storage-row'},
      $('span',{class:'storage-mount'},st.mount),
      $('div',{class:'storage-bar'},$('div',{class:`storage-fill ${stColor(st.percent)}`,style:`width:${st.percent}%`})),
      $('span',{class:'storage-pct'},`${st.percent}%`),
      $('span',{class:'storage-avail'},st.available)));
  });
  sec.appendChild($('div',{style:'margin-top:10px'},
    $('a',{class:'sec-link',href:'https://grafana.hwc.iheartwoodcraft.com',target:'_blank'},'Grafana →')));
  return sec;
}

// ── Tile wrapper ─────────────────────────────────────────────────────────────
function tile(section){const t=$('div',{class:'tile'});t.appendChild(section);return t}

// ── Main render ───────────────────────────────────────────────────────────────
let _sectionCount=0;
function render(data,liveThreads){
  app.innerHTML='';_sectionCount=0;
  if(data.error){
    app.appendChild($('div',{class:'err-box'},$('h2',null,'Briefing Unavailable'),$('p',null,data.error_message||'Failed to compile briefing')));
    renderFooter(data);return;
  }
  const s=data.sections,ago=timeAgo(data.generated_at);

  // Header (full-width above grid)
  const now=new Date();
  app.appendChild($('div',{class:'hdr'},
    $('div',{class:'hdr-label'},'Heartwood Briefing'),
    $('div',{class:'hdr-day'},fmtDay(now)),
    $('div',{class:'hdr-date'},fmtDate(now)),
    $('div',{class:'hdr-updated',html:`updated <span class="${ago.cls}">${ago.text}</span>`})
  ));

  // Alerts (full-width above grid) — each links to the surface it reports on,
  // same routing as the email render (run.sh aurl()).
  const ALERT_URL={ops:'https://grafana.hwc.iheartwoodcraft.com/d/service-health',
    leads:'https://app.jobtread.com',overdue:'https://app.jobtread.com',jobs:'https://app.jobtread.com',
    website:'https://stats.iheartwoodcraft.com',
    system:'https://grafana.hwc.iheartwoodcraft.com',backup:'https://grafana.hwc.iheartwoodcraft.com',
    config_drift:'https://github.com/eriqueo/nixos-hwc'};
  if(data.alerts&&data.alerts.length){
    const a=$('div',{class:'alerts'});
    data.alerts.forEach(al=>{
      const el=$('div',{class:`alert alert-${al.level}`},al.message);
      const u=ALERT_URL[al.section];
      if(u){el.appendChild(document.createTextNode(' '));el.appendChild($('a',{class:'lnk',href:u,target:'_blank'},'view →'))}
      a.appendChild(el);
    });
    app.appendChild(a);
  }

  // Dashboard grid
  const grid=$('div',{class:'dashboard-grid'});

  if(s.calendar){_sectionCount++;grid.appendChild(tile(makeCalendar(s.calendar)))}
  if(data.mail_triage||s.mail){_sectionCount++;grid.appendChild(tile(makeMailTile(data.mail_triage,liveThreads,s.mail)))}
  if(s.tasks){_sectionCount++;grid.appendChild(tile(makeTasks(s.tasks)))}
  // Leads + overdue render even when empty: "Nothing overdue" is information,
  // a silently missing tile is not.
  if(s.leads){_sectionCount++;grid.appendChild(tile(makeLeads(s.leads)))}
  if(s.overdue){_sectionCount++;grid.appendChild(tile(makeOverdue(s.overdue)))}
  if(s.jobs){_sectionCount++;grid.appendChild(tile(makeJobs(s.jobs)))}
  if(s.system){_sectionCount++;grid.appendChild(tile(makeSystem(s.system)))}
  if(s.ops&&Object.keys(s.ops).length){_sectionCount++;grid.appendChild(tile(makeOps(s.ops)))}
  if(s.weather){_sectionCount++;grid.appendChild(tile(makeWeather(s.weather)))}
  if(s.weekly_snapshot){_sectionCount++;grid.appendChild(tile(makeSnapshot(s.weekly_snapshot)))}
  if(s.website&&Object.keys(s.website).length){_sectionCount++;grid.appendChild(tile(makeWebsite(s.website)))}
  if(s.recent_documents){const d=makeRecentDocs(s.recent_documents);if(d){_sectionCount++;grid.appendChild(tile(d))}}
  if(s.backup&&Object.keys(s.backup).length){_sectionCount++;grid.appendChild(tile(makeBackup(s.backup)))}
  // A comms tile with no source is four zeros pretending to be data — skip it.
  const commsAlive=s.comms&&(s.comms.source&&s.comms.source!=='none'||(s.comms.items||[]).length>0);
  if(commsAlive){_sectionCount++;grid.appendChild(tile(makeComms(s.comms)))}

  app.appendChild(grid);
  renderFooter(data);
}

function renderFooter(data){
  const ago=data.generated_at?timeAgo(data.generated_at):null;
  const parts=['Heartwood Briefing'];
  if(ago)parts.push(`Last compiled ${ago.text}`);
  if(_sectionCount)parts.push(`${_sectionCount} sections loaded`);
  app.appendChild($('div',{class:'footer'},parts.join(' \u00b7 ')));
}

// ── Load + refresh ────────────────────────────────────────────────────────────
const app=document.getElementById('app');
async function load(){
  try{
    const[data,liveThreads]=await Promise.all([
      fetch(`./briefing.json?t=${Date.now()}`).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}),
      fetchLiveThreads()
    ]);
    render(data,liveThreads);
  }catch(e){render({error:true,error_message:`Could not load briefing: ${e.message}`})}
}

// Pull to refresh
let startY=0,pulling=false;const ptr=document.getElementById('ptr');
document.addEventListener('touchstart',e=>{if(window.scrollY===0&&e.touches.length===1){startY=e.touches[0].clientY;pulling=true}},{passive:true});
document.addEventListener('touchmove',e=>{if(!pulling)return;const dy=e.touches[0].clientY-startY;ptr.classList.toggle('visible',dy>120)},{passive:true});
document.addEventListener('touchend',()=>{if(ptr.classList.contains('visible')){ptr.textContent='refreshing...';load().then(()=>setTimeout(()=>{ptr.classList.remove('visible');ptr.textContent='pull to refresh'},500))}pulling=false});

// Keyboard shortcut: 'r' to refresh
document.addEventListener('keydown',e=>{if(e.key==='r'&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&document.activeElement===document.body)load()});

setInterval(load,5*60*1000);
load();
</script>
