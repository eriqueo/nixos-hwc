<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Heartwood Craft — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg1); }
  .hwc-scroll { height: 100vh; overflow-y: auto; }
  ::selection { background: var(--accent); color: var(--bg1); }
  input:focus, textarea:focus, select:focus { border-color: var(--accent) !important; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .page { animation: fadeIn 380ms cubic-bezier(0.2,0.7,0.2,1); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="hwc">
<div id="root"></div>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Process.jsx"></script>
<script type="text/babel" src="Testimonial.jsx"></script>
<script type="text/babel" src="ContactForm.jsx"></script>
<script type="text/babel" src="ServicePage.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>

<script type="text/babel">
const App = () => {
  const [route, setRoute] = React.useState('home');
  const scrollRef = React.useRef(null);
  const onNavigate = (r) => {
    setRoute(r);
    requestAnimationFrame(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; });
  };

  let page;
  if (route.startsWith('service:')) {
    const svc = route.split(':')[1];
    page = <ServicePage service={svc} onNavigate={onNavigate} />;
  } else {
    page = {
      home: <HomePage onNavigate={onNavigate} />,
      services: <ServicesPage onNavigate={onNavigate} />,
      process: <ProcessPage />,
      about: <AboutPage />,
      contact: <ContactPage />,
    }[route];
  }

  return (
    <div ref={scrollRef} className="hwc-scroll" data-screen-label={`01 Website — ${route}`}>
      <Header current={route.startsWith('service:') ? 'services' : route} onNavigate={onNavigate} />
      <main key={route} className="page">{page}</main>
      <Footer onNavigate={onNavigate} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
