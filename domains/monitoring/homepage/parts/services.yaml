- Business:
    - JobTread MCP:
        icon: mdi-api
        href: https://hwc.ocelot-wahoo.ts.net:16100
        description: Heartwood MCP Server
        ping: host.containers.internal:16100
    - Estimator API:
        icon: mdi-calculator
        href: http://localhost:8099/docs
        description: Remodel pricing API
        widget:
          type: customapi
          url: http://host.containers.internal:8099/health
          refreshInterval: 30000
          mappings:
            - field: status
              label: Status
              format: text
            - field: disk_space_gb
              label: Disk
              format: float
              suffix: " GB"
    - n8n:
        icon: n8n
        href: https://hwc.ocelot-wahoo.ts.net:2443
        description: Workflow automation
        server: localhost
        container: n8n
    - Paperless:
        icon: paperless-ngx
        href: https://hwc.ocelot-wahoo.ts.net/docs
        description: Document management
        server: localhost
        container: paperless

